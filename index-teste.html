<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Diagnóstico - R$ 5,00</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .bg-navy { background-color: #001A3D; }
        .text-gold { color: #C5A059; }
        .bg-gold { background-color: #C5A059; }
        .border-gold { border-color: #C5A059; }
        .gradient-gold { background: linear-gradient(135deg, #C5A059 0%, #E8D099 50%, #C5A059 100%); }
        .star-btn svg { transition: all 0.3s ease; fill: transparent !important; }
        .star-btn.active svg { fill: #C5A059 !important; stroke: #C5A059 !important; }
        .spinner { border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 3px solid #fff; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '780585197508218');
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=780585197508218&ev=PageView&noscript=1"
    /></noscript>
</head>
<body class="bg-gray-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-100 py-4 shadow-sm">
        <div class="container mx-auto px-4 flex justify-center">
            <div class="flex items-center gap-2">
                <i data-lucide="award" class="text-gold w-8 h-8"></i>
                <span class="text-navy font-black text-xl tracking-tighter uppercase">Teste <span class="text-gold">Diagnóstico</span></span>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="max-w-md w-full">
            <div class="bg-navy rounded-[2.5rem] p-8 md:p-10 border-4 border-gold shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    
                    <div id="paymentFormArea">
                        <div class="text-center mb-8">
                            <h1 class="text-2xl md:text-3xl font-black text-white mb-2 uppercase">Checkout Teste</h1>
                            <p class="text-slate-300 text-sm font-light">Valor simbólico para diagnóstico: R$ 5,00</p>
                        </div>

                        <form id="pixForm" class="space-y-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 tracking-wider">Nome Completo</label>
                                <input type="text" id="full_name" required placeholder="Ex: João Silva" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-gold transition-all">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 tracking-wider">E-mail</label>
                                <input type="email" id="email" required placeholder="Ex: joao@email.com" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-gold transition-all">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 tracking-wider">CPF</label>
                                <input type="text" id="cpf" required placeholder="000.000.000-00" maxlength="14" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-gold transition-all">
                            </div>

                            <div class="bg-white/5 rounded-2xl p-4 border border-white/5 flex items-center justify-between mb-6">
                                <span class="text-slate-400 text-sm">Total a pagar:</span>
                                <span class="text-white font-black text-xl">R$ 5,00</span>
                            </div>

                            <button type="submit" id="btnSubmit" class="gradient-gold text-navy w-full py-4 rounded-2xl font-black text-lg hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center gap-3 shadow-lg">
                                <span id="btnText">GERAR PIX DE TESTE</span>
                                <div id="btnSpinner" class="hidden spinner"></div>
                            </button>
                        </form>
                    </div>

                    <div id="qrCodeArea" class="hidden text-center">
                        <div class="w-20 h-20 bg-gold rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                            <i data-lucide="check" class="text-navy w-10 h-10 stroke-[3px]"></i>
                        </div>
                        <h2 class="text-2xl font-black text-white mb-2 uppercase">PIX GERADO!</h2>
                        <div class="bg-white p-4 rounded-3xl shadow-2xl inline-block mb-8 border-4 border-gold">
                            <img id="qrCodeImg" src="" alt="QR Code PIX" class="w-48 h-48">
                        </div>
                        <div class="space-y-4 text-left">
                            <div class="flex items-center gap-2 bg-white/5 border border-white/10 p-4 rounded-2xl">
                                <input type="text" readonly id="pixCode" class="bg-transparent border-none outline-none text-white font-medium text-xs flex-grow truncate">
                                <button onclick="copyPixCode()" id="btnCopy" class="bg-gold text-navy p-2 rounded-xl">
                                    <i data-lucide="copy" class="w-4 h-4" id="copyIcon"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const cpfInput = document.getElementById('cpf');
        cpfInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = value;
        });

        document.getElementById('pixForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            document.getElementById('btnText').classList.add('hidden');
            document.getElementById('btnSpinner').classList.remove('hidden');

            const formData = {
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                cpf: document.getElementById('cpf').value
            };

            try {
                const response = await fetch('/api/pay-teste', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await response.json();
                if (response.ok) {
                    if (typeof fbq === 'function') {
                        fbq('track', 'InitiateCheckout', { value: 5.00, currency: 'BRL' });
                    }
                    document.getElementById('paymentFormArea').classList.add('hidden');
                    document.getElementById('qrCodeArea').classList.remove('hidden');
                    document.getElementById('qrCodeImg').src = `data:image/png;base64,${data.qr_code_base64}`;
                    document.getElementById('pixCode').value = data.qr_code;
                } else {
                    alert('Erro: ' + (data.error || 'Falha ao gerar PIX.'));
                    console.error(data);
                    btn.disabled = false;
                    document.getElementById('btnText').classList.remove('hidden');
                    document.getElementById('btnSpinner').classList.add('hidden');
                }
            } catch (err) {
                alert('Erro de conexão.');
                btn.disabled = false;
                document.getElementById('btnText').classList.remove('hidden');
                document.getElementById('btnSpinner').classList.add('hidden');
            }
        });

        function copyPixCode() {
            const input = document.getElementById('pixCode');
            input.select();
            navigator.clipboard.writeText(input.value).then(() => {
                alert('Código copiado!');
            });
        }
    </script>
</body>
</html>
